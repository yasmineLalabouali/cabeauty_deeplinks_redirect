<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabeauty</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #fdf0f4 0%, #f5d5df 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    max-width: 360px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(196,96,122,0.15);
  }
  .logo {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #c4607a;
    margin-bottom: 4px;
  }
  .logo-sub {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #a09890;
    margin-bottom: 28px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #f5d5df;
    border-top-color: #c4607a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status {
    font-size: 15px;
    color: #6b6560;
    margin-bottom: 8px;
  }
  .sub {
    font-size: 12px;
    color: #a09890;
    margin-bottom: 28px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1a1015;
    color: white;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-store {
    background: #c4607a;
    margin-top: 10px;
  }
  .actions { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #step-loading { display: block; }
  #step-store { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Cabeauty</div>
  <div class="logo-sub">Cosmétique Cabas</div>

  <!-- Étape 1 : chargement -->
  <div id="step-loading">
    <div class="spinner"></div>
    <div class="status">Ouverture de l'application...</div>
    <div class="sub">Si l'app ne s'ouvre pas automatiquement</div>
    <div class="actions">
      <a href="#" id="btn-open-app" class="btn">📱 Ouvrir l'app</a>
    </div>
  </div>

  <!-- Étape 2 : app non installée -->
  <div id="step-store">
    <div style="font-size:48px;margin-bottom:16px">💄</div>
    <div class="status">Téléchargez Cabeauty</div>
    <div class="sub">Cosmétiques européens · Livraison partout en Algérie</div>
    <div class="actions">
      <a href="https://play.google.com/store/apps/details?id=com.cabeauty.app" class="btn btn-store">
        ▶ Google Play Store
      </a>
      <a href="https://apps.apple.com/app/cabeauty/idTON-APP-ID" class="btn" style="background:#555">
        🍎 App Store
      </a>
    </div>
  </div>
</div>

<script>
 // Tout en haut du script
console.log('URL complète:', window.location.href);
console.log('search:', window.location.search);
console.log('hash:', window.location.hash);
  // Récupère les paramètres de l'URL
  // Formats supportés :
  //   /redirect?type=product&id=UUID  → cabeauty://product/UUID
  //   /redirect?type=order&id=UUID    → cabeauty://order/UUID
  //   /redirect?type=shop             → cabeauty://shop
  //   /redirect                       → cabeauty://home

  const params = new URLSearchParams(window.location.search);
  const type = params.get('type') || 'home';
  const id   = params.get('id')   || '';

  // Construire le deep link
  let deepLink = 'cabeauty://home';
  if (type === 'product' && id) deepLink = `cabeauty://product/${id}`;
  if (type === 'order'   && id) deepLink = `cabeauty://order/${id}`;
  if (type === 'shop')          deepLink = 'cabeauty://shop';

  // Bouton manuel
  document.getElementById('btn-open-app').href = deepLink;

  // Tentative d'ouverture automatique
  function tryOpenApp() {
    // Ouvrir le deep link
    window.location = deepLink;

    // Si après 2.5s l'utilisateur est toujours là → app non installée
    setTimeout(() => {
      document.getElementById('step-loading').style.display = 'none';
      document.getElementById('step-store').style.display  = 'block';
    }, 2500);
  }

  // Lancer au chargement
  window.addEventListener('load', () => {
    setTimeout(tryOpenApp, 500); // petit délai pour que la page soit visible
  });
</script>
</body>
</html>
